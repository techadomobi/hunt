kind = "web"
previewPath = "/"
title = "Mercury — Slots & Casino"
version = "1.0.0"
id = "artifacts/mercury"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24732

[services.development]
run = "pnpm --filter @workspace/mercury run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mercury", "run", "build" ]
publicDir = "artifacts/mercury/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24732"
BASE_PATH = "/"
